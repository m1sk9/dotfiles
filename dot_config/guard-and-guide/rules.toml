version = 1

# =============================================================================
# Dangerous commands (no alternative - tell the user)
# =============================================================================

# --- Data destruction ---

[[rules]]
matcher = "Bash"
regex = '\bshred\b'
message = "Use of 'shred' is prohibited. Ask the user to execute it."

[[rules]]
matcher = "Bash"
regex = '\bwipe\b'
message = "Use of 'wipe' is prohibited. Ask the user to execute it."

[[rules]]
matcher = "Bash"
regex = '\bdd\b'
message = "Use of 'dd' is prohibited. Ask the user to execute it."

[[rules]]
matcher = "Bash"
regex = '\btruncate\b'
message = "Use of 'truncate' is prohibited. Ask the user to execute it."

# --- Privilege escalation ---

[[rules]]
matcher = "Bash"
regex = '\bsudo\b'
message = "Use of 'sudo' is prohibited. Ask the user to execute it."

[[rules]]
matcher = "Bash"
regex = '\bsu\b'
message = "Use of 'su' is prohibited. Ask the user to execute it."

[[rules]]
matcher = "Bash"
regex = '\bdoas\b'
message = "Use of 'doas' is prohibited. Ask the user to execute it."

