# --- Remote connections ---

[[rules]]
matcher = "Bash"
regex = '\bssh\b'
message = "Use of 'ssh' is prohibited. Ask the user to execute it."

[[rules]]
matcher = "Bash"
regex = '\b(sftp|ftp)\b'
message = "Use of 'sftp/ftp' is prohibited. Ask the user to execute it."

# --- Dangerous shell control ---

[[rules]]
matcher = "Bash"
regex = '\beval\b'
message = "Use of 'eval' is prohibited. Ask the user to execute it."

[[rules]]
matcher = "Bash"
regex = '\bexec\b'
message = "Use of 'exec' is prohibited. Ask the user to execute it."

[[rules]]
matcher = "Bash"
regex = '^\.\s'
message = "Use of 'source (.)' is prohibited. Ask the user to execute it."

[[rules]]
matcher = "Bash"
regex = '\bnohup\b'
message = "Use of 'nohup' is prohibited. Ask the user to execute it."

# =============================================================================
# Commands with alternatives (prohibited + suggest alternative)
# =============================================================================

# --- Package managers → use mise ---

[[rules]]
matcher = "Bash"
regex = '\b(brew|homebrew)\b'
message = "Use of 'brew' is prohibited. Use 'mise' to install runtimes and tools. If the package is not available in mise, ask the user to decide."

[[rules]]
matcher = "Bash"
regex = '\b(apt|apt-get|dpkg)\b'
message = "Use of 'apt/dpkg' is prohibited. Use 'mise' to install runtimes and tools. If the package is not available in mise, ask the user to decide."

[[rules]]
matcher = "Bash"
regex = '\b(yum|dnf)\b'
message = "Use of 'yum/dnf' is prohibited. Use 'mise' to install runtimes and tools. If the package is not available in mise, ask the user to decide."

[[rules]]
matcher = "Bash"
regex = '\bpacman\b'
message = "Use of 'pacman' is prohibited. Use 'mise' to install runtimes and tools. If the package is not available in mise, ask the user to decide."

# --- File transfer → use cp ---

[[rules]]
matcher = "Bash"
regex = '\bscp\b'
message = "Use of 'scp' is prohibited. Use 'cp' for local copies. For remote transfers, ask the user to execute it."

[[rules]]
matcher = "Bash"
regex = '\brsync\b'
message = "Use of 'rsync' is prohibited. Use 'cp' for local copies. For remote sync, ask the user to execute it."

# --- xargs → use pipes or loops ---

[[rules]]
matcher = "Bash"
regex = '\bxargs\b'
message = "Use of 'xargs' is prohibited. Use pipes or shell loops instead."

# =============================================================================
# Sensitive file protection (Read / Write / Edit)
# =============================================================================

# --- .env files ---

[[rules]]
matcher = "Read"
regex = '(^|/)\.env(\.[^/]*)?$'
message = "Reading '.env' files is prohibited. If you need to check environment variables, ask the user to share only the necessary values."

[[rules]]
matcher = "Write"
regex = '(^|/)\.env(\.[^/]*)?$'
message = "Writing to '.env' files is prohibited. Ask the user to edit the file directly."

[[rules]]
matcher = "Edit"
regex = '(^|/)\.env(\.[^/]*)?$'
message = "Editing '.env' files is prohibited. Ask the user to edit the file directly."

# --- Secret / credential files ---

[[rules]]
matcher = "Read"
regex = '(^|/)(\.secrets?|credentials?|secret[\._-]|.*[\._-]secret)(\..*)?$'
message = "Reading secret/credential files is prohibited. Ask the user to share only the necessary values."

[[rules]]
matcher = "Write"
regex = '(^|/)(\.secrets?|credentials?|secret[\._-]|.*[\._-]secret)(\..*)?$'
message = "Writing to secret/credential files is prohibited. Ask the user to edit the file directly."

[[rules]]
matcher = "Edit"
regex = '(^|/)(\.secrets?|credentials?|secret[\._-]|.*[\._-]secret)(\..*)?$'
message = "Editing secret/credential files is prohibited. Ask the user to edit the file directly."
