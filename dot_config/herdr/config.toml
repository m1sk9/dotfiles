onboarding = false

[terminal]
default_shell = "/opt/homebrew/bin/fish"

[update]
channel = "stable"
version_check = true
manifest_check = true

[[keys.command]]
key = "prefix+ctrl+g"
type = "popup"
# Why not lazygit を直接: バイナリ直起動だと herdr server の PATH しか継承せず，
# mise shims (pnpm 等) が通らず .husky/pre-commit が pnpm: command not found になる
command = "/opt/homebrew/bin/fish -c /opt/homebrew/bin/lazygit"
description = "run lazygit"
width = "95%"
height = "95%"

[[keys.command]]
key = "prefix+ctrl+p"
type = "popup"
command = "/opt/homebrew/bin/fish"
description = "scratch shell"
width = "95%"
height = "95%"

[[keys.command]]
key = "prefix+ctrl+z"
type = "shell"
command = "/opt/homebrew/bin/zed $HERDR_ACTIVE_PANE_CWD"
description = "open in zed"

[[keys.command]]
key = "prefix+ctrl+h"
type = "popup"
command = "/opt/homebrew/bin/hunk diff"
description = "open hunk"
width = "95%"
height = "95%"

[ui]
mouse_scroll_lines = 3
agent_panel_sort = "spaces"

[experimental]
pane_history = false

[theme]
name = "tokyo-night"
auto_switch = false
