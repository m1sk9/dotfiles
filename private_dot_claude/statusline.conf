# ~/.claude/statusline.conf — claude-code-status-bar configuration
#
# This file is yours: it is NEVER overwritten by updates or re-installs.
# Every option below is COMMENTED OUT and shows its default. To change one,
# uncomment the line (remove the leading "# ") and edit the value. Leaving a
# line commented keeps the default — and lets you pick up future default changes.
#
# See every resolved value (defaults + your overrides):
#   bash ~/.claude/statusline-command.sh --dump-config
# Preview a theme (or all of them):
#   bash ~/.claude/statusline-command.sh --demo
# Full docs: https://github.com/briansmith80/claude-code-status-bar#configuration

# ── Refresh rate (set in settings.json, NOT here) ───────────
# How OFTEN Claude Code re-runs the bar is "refreshInterval", set inside the
# "statusLine" block of ~/.claude/settings.json — it is NOT an option in this
# file. Without it the bar only updates on a new message; with it the countdown
# labels and live-activity line also stay fresh while you're idle, and edits to
# this file show up within that many seconds. Recommended: 2+ on Windows, 1 on
# macOS/Linux (a value below the script's runtime blanks the bar).
#   "statusLine": {
#     "command": "bash \"~/.claude/statusline-command.sh\"",
#     "refreshInterval": 2
#   }

# ── Colour theme ────────────────────────────────────────────
# default | nord | dracula | solarized | tokyo-night | catppuccin | matrix | mono
# colour_theme=default

# ── Progress-bar gradient ───────────────────────────────────
# true = the theme's gradient ramp (default) · false = flat single colour ·
# heat = a fixed green→yellow→orange→red ramp on any theme
# bar_gradient=true

# ── Directory display ───────────────────────────────────────
# auto = full path when it fits, basename when the line is too narrow (default)
# full = always the whole path · basename = always just the last folder
dir_style=basename

# ── Layout (1–3 lines) ──────────────────────────────────────
# Pick a preset, or hand-build each line. Presets:
#   classic    = all metrics on line 1, live activity on line 2 (the default)
#   three-line = model/usage/cost · dir/branch/git state · activity
#   stacked    = dir/model/usage · git state/duration · activity
layout=classic
#
# Override any line with a space-separated list of segment TOKENS (these win
# over the preset, per line). IMPORTANT: quote any value with spaces, and an
# empty line hides that row:
#   line1="model context usage_5h usage_7d duration cost"
#   line2="dir branch lines_changed ahead_behind dirty stash pr"
#   line3="activity"
# Identity+context on line 1, usage_5h+duration on line 2, usage_7d+cost on line 3:
line1="model effort dir branch context"
line2="usage_5h duration"
line3="usage_7d cost"
# Reorder freely, e.g. put the activity line on top:
#   line1="activity"
#   line2="dir branch"
#   line3="model context cost"
# Tokens (one segment each; list in the order you want them):
#   dir branch model context usage_5h usage_7d lines_changed dirty
#   ahead_behind stash pr duration worktree cost cost_rate vim agent
#   effort fast_mode tokens update activity
# Notes: 'activity' is the live line (needs Node.js). Unknown tokens are
# ignored. A token still obeys its show_* toggle — a disabled segment never
# appears even if listed. Segments you don't list anywhere won't show.

# ── Icons ───────────────────────────────────────────────────
# classic = today's icon set (default) · modern = a refreshed set
#   (directory ↱, branch ⑂, lines-changed ⇄, duration ⏱; model ◆ unchanged)
# icon_set=classic
# use_icons=true          # set false to drop all icons regardless of icon_set

# ── Usage-limit labels ──────────────────────────────────────
# countdown = time remaining like 2h20m (default) · clock = reset time like 2pm
# usage_label=countdown
# Burn-rate forecast: when you're on track to hit a limit BEFORE it resets, the
# countdown becomes a ▲time-to-limit warning (e.g. ▲1h20m). Only shows when
# you're over an even pace, so it stays quiet otherwise. Set false to disable.
# usage_forecast=true
# Model-scoped weekly swap: some plans carry a per-model weekly limit (the
# "Fable"/"Opus" row on claude.ai) alongside the all-models one. When that
# scoped limit is running HIGHER — i.e. it will throttle you first — the wk bar
# swaps to it, named: "wk:Fable (3d17h) ███░░ 36%". Reads your existing Claude
# Code login in the background (nothing extra to set up); where that data
# isn't available (API-key sessions, CI tokens) the plain all-models bar
# simply stays — fail-silent, never a prompt or an error. Set false to always
# keep the plain all-models wk bar (and skip the background fetch).
# usage_scoped=true

# ── Claude API status (status.claude.com) ───────────────────
# Opt-in early-warning badge — shows ONLY when Claude is degraded (nothing when
# healthy). Polls the public Claude status page in the background (never on the
# render path, so it can't slow or block the bar). It's an early warning, not
# ground truth: a status page is reactive and can lag a live incident. OFF by
# default because it contacts an extra host (status.claude.com).
# show_claude_status=false
# claude_status_min=major          # major = only major/critical outages (default) ·
#                                  # minor = also minor degradation + maintenance windows
# claude_status_cache_seconds=300  # background poll interval (the status page's edge
#                                  # cache is ~10s, so polling faster gains nothing)
# The badge links to status.claude.com when pr_link=true (the shared link toggle).

# ── Segments — turn any off with =false (all on unless noted) ─
# show_directory  show_branch  show_model  show_context_bar  show_cost
# show_lines_changed  show_dirty_count  show_ahead_behind  show_stash
# show_duration  show_worktree  show_usage_5h  show_usage_7d  show_pr
# show_effort  show_fast_mode  show_vim_mode  show_agent
# show_tokens=false      # OFF by default — input/output token counts
# show_cost_rate=false   # OFF by default — $/hr (appears after ~1 min)
show_vim_mode=false      # drop the INSERT/NORMAL segment (redundant with Claude Code's own hint)

# ── Live activity line (line 2; needs Node.js) ──────────────
# Not vendored via .chezmoiexternal.toml (no node dependency wanted), so force
# this off regardless of upstream default — helper/subagent scripts aren't
# present and the line would otherwise silently no-op every render.
show_activity=false
# activity_colour=true   # per-segment colours, spinner, heat, completion flash
# activity_pulse=false   # opt-in: running label breathes (needs odd refreshInterval, e.g. 3)
# activity_scanner=false # opt-in: sweeping tracker once a tool runs >30s

# ── Layout & width ──────────────────────────────────────────
# bar_width=10           # progress-bar width in characters
# enable_truncation=true # drop low-priority segments on narrow terminals (default on)
# max_width=             # override the detected terminal width (empty = auto)
# branch_max_length=     # truncate long branch names with … (empty = no limit)
# use_groups=false       # bracket related segments: [model+context] [usage] [git] …

# ── Git performance (large / network-mounted repos) ─────────
# git_untracked=true     # false adds --untracked-files=no: skips the untracked
#                        # scan (the part of `git status` that scales with repo
#                        # size). Faster on huge/monorepo/network checkouts; the
#                        # trade-off is untracked files no longer count as dirty.
# git_timeout=0          # >0 wraps the git calls in `timeout N` (or gtimeout) so
#                        # a hung NFS/SMB mount can't stall the render. 0 = off.

# ── Context warning ─────────────────────────────────────────
# auto = warn within 20k tokens of auto-compact (default) · or a raw % like 80
# context_warn_threshold=auto

# ── Automatic updates ───────────────────────────────────────
# auto_update=false      # opt-in: install new versions in the background

# ── Timing (defaults are sensible) ──────────────────────────
# activity_ttl_seconds=120   # hide line 2 when its cache is older than this
# activity_fresh_seconds=45  # fade line 2 to dim when its data is older
# usage_cache_seconds=600    # OAuth usage refresh (fallback 5h/7d numbers on old
#                            # Claude Code; the scoped-weekly data on new ones)
